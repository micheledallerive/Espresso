name: Continuous Integration

on:
  push:
    branches:
      - feature/*
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    name: Build the project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build
        uses: ./.github/actions/build
  test:
    name: Run GTests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v2
      - name: Build
        uses: ./.github/actions/build
      - name: Run Test
        run: cd build && ctest -V